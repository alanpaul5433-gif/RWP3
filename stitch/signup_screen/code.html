<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            "outline": "#8f6f6e",

            "on-surface": "#161d16",

            "on-background": "#161d16",

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      backdrop-filter: blur(24px);
      background: rgba(243, 252, 240, 0.7);
    }
    .editorial-shadow {
      box-shadow: 0 12px 24px rgba(22, 29, 22, 0.06);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">
<!-- Main Content Layout -->
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Hero Editorial Section (Left) -->
<section class="hidden md:flex relative w-1/2 bg-on-surface overflow-hidden items-center justify-center p-12">
<div class="absolute inset-0 z-0 opacity-60">
<img class="w-full h-full object-cover" data-alt="Modern high-contrast photograph of a sleek red luxury vehicle moving through a neon-lit city street at night with motion blur." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjSUObOmqMeIBlPdK89pIW4NO7pXZzZEgjlAsmbv8xSkbRoU1Ig_IF6Ztm8ip0I8K1okadlCJ2vVyyz6xuDUlOA4uD6zLjBKQERaWJb2TQWT6Ipf4s4JQ3103rYQkvzIKVxsiiV7Q_Pmm2Riqe9_RPRVaaCYHsgOaWLX4fX9DidPKiVD3oO-7XISblx0Ic2rLBfXrEkvYygaW2EzOho6Aewqyz5UONeUg3jsmwEl_i5SS_1UcI4Ms1ZOlCe8noyi9qmEHKmZRhHjZ6"/>
</div>
<!-- Tonal Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/40 to-transparent z-10"></div>
<!-- Editorial Branding Content -->
<div class="relative z-20 max-w-lg">
<h1 class="font-headline font-black italic text-[5rem] leading-[0.9] text-white tracking-tighter mb-6">
          VELOCITY
        </h1>
<p class="font-headline text-2xl font-medium text-white/90 leading-tight tracking-tight">
          Redefining the urban pulse. <br/>Join the elite circle of commuters.
        </p>
<div class="mt-12 flex items-center gap-4">
<div class="h-px w-12 bg-primary"></div>
<span class="text-xs font-bold uppercase tracking-widest text-primary">Est. 2024</span>
</div>
</div>
</section>
<!-- Signup Form Section (Right) -->
<section class="flex-1 flex flex-col justify-center px-6 py-12 md:px-20 lg:px-32 bg-surface">
<!-- Mobile Header -->
<div class="md:hidden mb-8">
<span class="font-headline font-black italic text-2xl text-primary tracking-tighter">VELOCITY</span>
</div>
<div class="max-w-md w-full mx-auto">
<header class="mb-10">
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">Create Account</h2>
<p class="text-secondary font-medium">Step into the future of urban mobility.</p>
</header>
<!-- Form Elements -->
<form class="space-y-6">
<!-- Full Name -->
<div class="group">
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-2 px-4">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-secondary/50 font-medium" placeholder="Cameron Williamson" type="text"/>
</div>
</div>
<!-- Email -->
<div class="group">
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-2 px-4">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-secondary/50 font-medium" placeholder="cameron.w@velocity.com" type="email"/>
</div>
</div>
<!-- Grid for Password and Gender -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
<!-- Password -->
<div>
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-2 px-4">Password</label>
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 font-medium" placeholder="••••••••" type="password"/>
</div>
<!-- Gender Selection (Styled Radio Group) -->
<div>
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-2 px-4">Gender</label>
<select class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 font-medium appearance-none">
<option disabled="" selected="" value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
</div>
</div>
<!-- Referral Code -->
<div class="group">
<label class="block text-[11px] font-bold uppercase tracking-widest text-secondary mb-2 px-4">Referral Code (Optional)</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-6 py-4 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-secondary/50 font-medium tracking-widest" placeholder="VELO-2024" type="text"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-headline font-bold text-lg editorial-shadow hover:opacity-90 active:scale-[0.98] transition-all duration-200 relative overflow-hidden group" type="submit">
<span class="relative z-10">Start Your Journey</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-10">
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.2em]">Or Sign Up With</span>
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container-lowest border border-outline-variant/30 py-3.5 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold tracking-tight text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-on-surface py-3.5 rounded-full hover:opacity-90 transition-opacity active:scale-95 duration-200">
<svg class="w-5 h-5 fill-white" viewbox="0 0 384 512">
<path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path>
</svg>
<span class="text-sm font-semibold tracking-tight text-white">Apple</span>
</button>
</div>
<!-- Footer Link -->
<p class="mt-12 text-center text-secondary font-medium">
          Already a member? 
          <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Log In</a>
</p>
</div>
</section>
</main>
<!-- Legal Microcopy Floating Grid (Desktop Only) -->
<div class="hidden lg:grid fixed bottom-8 left-8 grid-cols-3 gap-8 z-30 opacity-50 pointer-events-none">
<div class="text-[10px] font-bold uppercase tracking-widest text-white/40">Premium Tier Commute</div>
<div class="text-[10px] font-bold uppercase tracking-widest text-white/40">Encrypted Transactions</div>
<div class="text-[10px] font-bold uppercase tracking-widest text-white/40">24/7 Security HUD</div>
</div>
</body></html>
