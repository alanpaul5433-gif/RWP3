name: customer
description: RWP3 Customer App - Book and track rides
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core shared package
  core:
    path: ../core

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0

  # Dependency Injection
  get_it: ^8.0.3

  # Functional Programming
  dartz: ^0.10.1

  # Equality
  equatable: ^2.0.5

  # Navigation
  go_router: ^15.1.3

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
